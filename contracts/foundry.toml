[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.27"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read", path = "./" }]
remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
  "@ensdomains/ens-contracts/=lib/ens-contracts/contracts/",
  "forge-std/=lib/forge-std/src/",
]

[profile.ci]
verbosity = 4
fuzz = { runs = 256 }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = false
int_types = "long"

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", url = "https://api-sepolia.etherscan.io/api", chain = 11155111 }
